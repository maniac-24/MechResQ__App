name: appmechresq
description: "MechResQ Flutter App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  intl: 0.20.2
  device_info_plus: ^10.1.0
  google_maps_flutter: ^2.6.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  image_picker: ^1.0.7
  file_selector: ^1.0.3
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^8.1.0
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_svg: ^2.2.3
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.6.6
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^18.0.1
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.6
  timezone: ^0.9.2
  video_player: ^2.8.2
  razorpay_flutter: ^1.3.7
  pdf: ^3.10.8
  printing: ^5.13.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/mechresq_logo.png
    - assets/mechresq_logo.svg